<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wonderful Life Party</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    text-align:center;
    background:linear-gradient(45deg,#ff4e50,#fc913a,#f9d423,#24fe41);
    background-size:400% 400%;
    animation:bgmove 10s infinite alternate;
    color:white;
}

@keyframes bgmove{
    0%{background-position:left;}
    100%{background-position:right;}
}

h1{
    font-size:50px;
    margin-top:30px;
    text-shadow:3px 3px 10px black;
}

.message{
    font-size:22px;
    margin-top:20px;
    background:rgba(0,0,0,0.4);
    padding:20px;
    border-radius:15px;
    display:inline-block;
}

.dolls{
    margin-top:40px;
}

.doll{
    font-size:80px;
    display:inline-block;
    margin:20px;
    animation:dance 1s infinite alternate;
}

.doll:nth-child(2){
    animation-delay:0.3s;
}

.doll:nth-child(3){
    animation-delay:0.6s;
}

@keyframes dance{
    0%{transform:rotate(-10deg) translateY(0);}
    100%{transform:rotate(10deg) translateY(-20px);}
}

.footer{
    margin-top:40px;
    font-size:18px;
}
</style>
</head>

<body>

<h1>🎉 Wonderful Life Party 🎉</h1>

<div class="message">
✨ Life is beautiful, life is charming, and every moment is a celebration!  
Dance with joy, smile with love, and enjoy the wonderful party of life. ✨
</div>

<div class="dolls">
<div class="doll">💃</div>
<div class="doll">🕺</div>
<div class="doll">💃</div>
</div>

<div class="footer">
🎊 Keep dancing and enjoy the wonderful life! 🎊
</div>

</body>
</html>
